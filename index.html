<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Robux Generator</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 80px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 20px black;
    }
    input, button {
      margin-top: 10px;
      padding: 10px;
      width: 90%;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #22c55e;
      color: black;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>💰 Robux Generator</h2>
    <input type="text" id="username" placeholder="Nom d'utilisateur Roblox">
    <input type="number" id="amount" placeholder="Montant de Robux">
    <button onclick="generate()">Générer</button>
    <div id="result"></div>
  </div>

  <script>
    function generate() {
      const user = document.getElementById("username").value;
      const amount = document.getElementById("amount").value;
      const result = document.getElementById("result");

      if (user === "" || amount === "") {
        result.innerHTML = "❌ Remplis tous les champs.";
        return;
      }

      result.innerHTML = "Connexion aux serveurs Roblox...";
      setTimeout(() => {
        result.innerHTML = "Génération de " + amount + " Robux pour " + user + "...";
      }, 2000);

      setTimeout(() => {
        result.innerHTML = "😂 C'ÉTAIT UNE BLAGUE<br>⚠️ Aucun Robux ne peut être généré gratuitement.";
      }, 4000);
    }
  </script>

</body>
</html>
