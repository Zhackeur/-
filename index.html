<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Generator (Simulation)</title>
<style>
body {
  background: linear-gradient(135deg,#0f172a,#020617);
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 50px 10px;
  color: white;
}
.box {
  background: #1e293b;
  max-width: 380px;
  margin: auto;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 30px black;
}
h2 { margin-bottom: 5px; }
input, button {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}
button {
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}
button:hover { transform: scale(1.05); }
#progressBox {
  width: 100%;
  background: #334155;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}
#bar {
  height: 20px;
  width: 0%;
  background: #22c55e;
  border-radius: 10px;
  transition: width 0.3s ease;
}
#captcha {
  margin-top: 15px;
  background: #0f172a;
  border: 2px dashed #22c55e;
  padding: 10px;
  display: none;
  border-radius: 8px;
}
#captcha span {
  font-weight: bold;
  color: #22c55e;
}
#result { margin-top: 15px; font-weight: bold; }
footer {
  margin-top: 20px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>
<body>

<div class="box">
  <h2>💰 Robux Generator</h2>
  <p>Simulation réaliste pour prank & éducation</p>

  <input type="text" id="username" placeholder="Nom d'utilisateur Roblox">
  <input type="number" id="amount" placeholder="Montant de Robux">
  <button onclick="generate()">Générer</button>

  <div id="captcha">
    Cliquez sur <span id="captchaText"></span> pour continuer
  </div>

  <div id="progressBox">
    <div id="bar"></div>
  </div>

  <div id="result"></div>
</div>

<footer>
⚠️ Simulation prank & éducative – aucun Robux réel
</footer>

<audio id="sound" src="https://freesound.org/data/previews/415/415209_5121236-lq.mp3" preload="auto"></audio>

<script>
function generate() {
  const user = document.getElementById("username").value;
  const amount = document.getElementById("amount").value;
  const bar = document.getElementById("bar");
  const box = document.getElementById("progressBox");
  const result = document.getElementById("result");
  const captcha = document.getElementById("captcha");
  const captchaText = document.getElementById("captchaText");
  const sound = document.getElementById("sound");

  if (!user || !amount) {
    result.innerHTML = "❌ Remplis tous les champs.";
    return;
  }

  // Affiche faux captcha
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  const randomLetter = letters[Math.floor(Math.random()*letters.length)];
  captchaText.textContent = randomLetter;
  captcha.style.display = "block";
  result.innerHTML = "Veuillez résoudre le captcha...";

  captcha.onclick = () => {
    captcha.style.display = "none";
    box.style.display = "block";
    bar.style.width = "0%";
    let progress = 0;
    result.innerHTML = "Connexion aux serveurs Roblox...";
    sound.play();

    const messages = [
      "Vérification du compte...",
      "Analyse de sécurité...",
      "Génération de " + amount + " Robux pour " + user + "..."
    ];

    let msgIndex = 0;
    const interval = setInterval(() => {
      progress += 5;
      bar.style.width = progress + "%";

      if(progress % 20 === 0 && msgIndex < messages.length){
        result.innerHTML = messages[msgIndex];
        msgIndex++;
      }

      if(progress >= 100){
        clearInterval(interval);
        sound.pause();
        result.innerHTML = "😂 C'ÉTAIT UNE BLAGUE<br>❌ Aucun Robux ne peut être généré gratuitement.";
      }
    }, 250);
  }
}
</script>

</body>
</html>
